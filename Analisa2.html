<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA JS | Verification System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <script src="data_saluranmikro.js"></script>
    <script src="data_saluranphb.js"></script>

    <style>
        :root { --primary: #1c2b4a; --accent: #2f80ed; --bg: #f4f7fb; --white: #ffffff; --text-muted: #64748b; --danger: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; color: var(--primary); }
        
        #sidebar { width: 380px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; }
        .nav-back { padding: 25px 25px 5px 25px; }
        .link-back { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sidebar-header { padding: 5px 25px 30px 25px; }
        .sidebar-content { padding: 25px; flex-grow: 1; border-top: 1px solid #f1f5f9; overflow-y: auto; }

        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        .area-info-box { 
            position: absolute; bottom: 30px; left: 30px; 
            background: white; padding: 15px 25px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; border: 1px solid #e2e8f0;
        }
        .area-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; }
        .area-value { font-size: 24px; font-weight: 800; color: var(--accent); }

        .stasiun-label { 
            background: white; border: 1.5px solid var(--primary); font-weight: 800; 
            padding: 2px 8px; border-radius: 4px; font-size: 10px; color: var(--primary);
        }
        
        .status-card { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-warn { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-back">
        <a href="index.html?page=menu" class="link-back">
            <i data-lucide="arrow-left" size="16"></i> Kembali ke Menu Utama
        </a>
    </div>

    <div class="sidebar-header">
        <h1 style="font-size: 22px; font-weight: 800;">VERIFICATION SYSTEM</h1>
        <p style="font-size: 12px; opacity: 0.6;">Sudin SDA Jakarta Selatan</p>
    </div>

    <div class="sidebar-content">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
            <div style="width:30px; height:30px; background:var(--accent); color:white; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800;">1</div>
            <b style="font-size:16px;">Catchment Area</b>
        </div>
        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Gambar poligon pada peta untuk menghitung luas tangkapan air.</p>

        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px; border-top: 1px solid #eee; pt: 20px;">
            <div style="width:30px; height:30px; background:var(--primary); color:white; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800;">2</div>
            <b style="font-size:16px;">Analisa Hidrologi</b>
        </div>
        <div id="station-info-display">
            <p style="color: #94a3b8; font-size: 13px;">Silakan gambar area di peta.</p>
        </div>
    </div>
</div>

<div id="map-container">
    <div class="area-info-box">
        <div class="area-label">Luas Catchment</div>
        <div class="area-value"><span id="area-val">0.00</span> <small style="font-size: 14px;">Ha</small></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    // --- DATA DEFAULT (Jika Repository Belum Disinkronkan) ---
    const STATIONS_LIST = [
        {n:"KEMAYORAN", lat:-6.1556, lng:106.8400}, {n:"HALIM", lat:-6.2704, lng:106.8893},
        {n:"KLIMAT JATENG", lat:-6.5000, lng:106.7500}, {n:"KLIMAT BANTEN", lat:-6.2615, lng:106.7508},
        {n:"KATULAMPA", lat:-6.6332, lng:106.8371}, {n:"DEPOK", lat:-6.4006, lng:106.8319},
        {n:"MANGGARAI", lat:-6.2074, lng:106.8486}, {n:"KARET", lat:-6.1981, lng:106.8101},
        {n:"SETIABUDI TIMUR", lat:-6.2046, lng:106.8294}, {n:"MELATI", lat:-6.2008, lng:106.8180},
        {n:"ISTANA", lat:-6.1716, lng:106.8270}, {n:"KRUKUT HULU", lat:-6.3443, lng:106.7991},
        {n:"SUNTER HULU", lat:-6.3178, lng:106.9211}, {n:"PESANGGRAHAN", lat:-6.3971, lng:106.7718},
        {n:"ANGKE HULU", lat:-6.2183, lng:106.6945}, {n:"TANJUNGAN", lat:-6.1067, lng:106.7259},
        {n:"TOMANG BARAT", lat:-6.1671, lng:106.7800}, {n:"TELUK GONG", lat:-6.1335, lng:106.7776},
        {n:"PULO GADUNG", lat:-6.1910, lng:106.9042}, {n:"SUNTER KODAMAR", lat:-6.1551, lng:106.8869},
        {n:"RAWA BADAK", lat:-6.1211, lng:106.8967}, {n:"POMPA CIDENG", lat:-6.1736, lng:106.8063}
    ];

    // --- INISIALISASI PETA ---
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    var map = L.map('map', { zoomControl: false, layers: [osm] }).setView([-6.2845, 106.8124], 12);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    var drawnItems = new L.FeatureGroup().addTo(map);
    var stationLayer = L.layerGroup().addTo(map);

    // --- KONEKSI DATA ---
    function loadStations() {
        let stored = localStorage.getItem('sda_rainDB');
        let rainDB = {};

        if (stored) {
            rainDB = JSON.parse(stored);
            console.log("Menggunakan data dari Repository.");
        } else {
            STATIONS_LIST.forEach((st, i) => {
                rainDB[`st_${i}`] = { n: st.n, lat: st.lat, lng: st.lng, d: [] };
            });
            console.log("Menggunakan data Default.");
        }
        
        stationLayer.clearLayers();
        Object.keys(rainDB).forEach(id => {
            let s = rainDB[id];
            if (s.lat && s.lng) {
                let m = L.circleMarker([s.lat, s.lng], {
                    radius: 7, fillColor: "#f59e0b", color: "#fff", weight: 2, fillOpacity: 1
                }).addTo(stationLayer);
                m.bindTooltip(s.n, { permanent: true, direction: 'top', className: 'stasiun-label', offset: [0,-10] });
                m.options.stationName = s.n;
            }
        });
    }

    // --- LOGIKA HITUNG (TURF) ---
    function updateAnalysis() {
        if (drawnItems.getLayers().length === 0) {
            document.getElementById('area-val').innerText = "0.00";
            document.getElementById('station-info-display').innerHTML = "Silakan gambar area.";
            return;
        }

        let layer = drawnItems.getLayers()[0];
        let geojson = layer.toGeoJSON();
        
        // Luas Ha
        let area = turf.area(geojson) / 10000;
        document.getElementById('area-val').innerText = area.toFixed(2);

        // Cari Stasiun
        let found = [];
        stationLayer.eachLayer(m => {
            let pt = turf.point([m.getLatLng().lng, m.getLatLng().lat]);
            if (turf.booleanPointInPolygon(pt, geojson)) found.push(m.options.stationName);
        });

        let display = document.getElementById('station-info-display');
        if (found.length > 0) {
            display.innerHTML = `
                <div class="status-card status-ok">
                    <i data-lucide="check-circle"></i> Terdeteksi: ${found.join(", ")}
                </div>
                <p style="font-size: 11px; margin-top: 10px; color: #64748b;">Data hujan siap diolah untuk Luas ${area.toFixed(2)} Ha.</p>
            `;
        } else {
            display.innerHTML = `
                <div class="status-card status-warn">
                    <i data-lucide="alert-triangle"></i> Tidak ada stasiun dalam area.
                </div>
            `;
        }
        lucide.createIcons();
    }

    // --- DRAW CONTROL ---
    var drawControl = new L.Control.Draw({
        draw: { polygon: { shapeOptions: { color: '#2f80ed' } }, polyline: false, circle: false, marker: false, rectangle: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.clearLayers();
        drawnItems.addLayer(e.layer);
        updateAnalysis();
    });
    map.on(L.Draw.Event.EDITED, updateAnalysis);
    map.on(L.Draw.Event.DELETED, updateAnalysis);

    window.onload = () => { loadStations(); lucide.createIcons(); };
</script>
</body>
</html>
