<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA JS | Verification System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <script src="data_saluranmikro.js"></script>
    <script src="data_saluranphb.js"></script>

    <style>
        :root { --primary: #1c2b4a; --accent: #2f80ed; --bg: #f4f7fb; --white: #ffffff; --text-muted: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; color: var(--primary); }
        
        #sidebar { width: 380px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; }
        .nav-back { padding: 25px 25px 5px 25px; }
        .link-back { color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sidebar-header { padding: 5px 25px 30px 25px; }
        .sidebar-content { padding: 25px; flex-grow: 1; border-top: 1px solid #f1f5f9; overflow-y: auto; }

        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* Floating Luas */
        .area-info-box { 
            position: absolute; bottom: 30px; left: 30px; 
            background: white; padding: 15px 25px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000;
            border: 1px solid #e2e8f0;
        }
        .area-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .area-value { font-size: 24px; font-weight: 800; color: var(--accent); }

        .stasiun-label { 
            background: white; border: 1.5px solid var(--primary); font-weight: 800; 
            padding: 2px 8px; border-radius: 4px; font-size: 10px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.05); color: var(--primary);
        }
        
        .empty-state { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-back">
        <a href="index.html?page=menu" class="link-back">
            <i data-lucide="arrow-left" size="16"></i> Kembali ke Menu Utama
        </a>
    </div>

    <div class="sidebar-header">
        <h1 style="font-size: 22px; font-weight: 800;">VERIFICATION SYSTEM</h1>
        <p style="font-size: 12px; opacity: 0.6;">Suku Dinas SDA Jakarta Selatan</p>
    </div>

    <div class="sidebar-content">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
            <div style="width:30px; height:30px; background:var(--accent); color:white; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800;">1</div>
            <b style="font-size:16px;">Metode Catchment</b>
        </div>
        
        <div style="background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #edf2f7; margin-bottom: 25px;">
             <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Gunakan alat polygon di peta untuk menggambar area tangkapan air (catchment area).</p>
        </div>

        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
            <div style="width:30px; height:30px; background:var(--primary); color:white; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800;">2</div>
            <b style="font-size:16px;">Data Hujan Terpilih</b>
        </div>
        <div id="selected-station-info" class="empty-state">
            Belum ada stasiun yang terdeteksi di dalam area.
        </div>
    </div>
</div>

<div id="map-container">
    <div class="area-info-box">
        <div class="area-label">Luas Catchment</div>
        <div class="area-value"><span id="area-val">0.00</span> <small style="font-size: 14px;">Ha</small></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    // --- KONFIGURASI PETA ---
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    var map = L.map('map', { 
        zoomControl: false, 
        layers: [osm] 
    }).setView([-6.2845, 106.8124], 13);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // --- LAYER GROUPS ---
    var drawnItems = new L.FeatureGroup().addTo(map);
    var stationLayer = L.layerGroup().addTo(map);
    var layerMikro = L.layerGroup().addTo(map);
    var layerPHB = L.layerGroup().addTo(map);

    // --- RENDER DATA SALURAN ---
    if (typeof data_mikro !== 'undefined') {
        L.geoJSON(data_mikro, { style: { color: '#06b6d4', weight: 2, opacity: 0.8 } }).addTo(layerMikro);
    }
    if (typeof data_phb !== 'undefined') {
        L.geoJSON(data_phb, { style: { color: '#2563eb', weight: 4, opacity: 0.9 } }).addTo(layerPHB);
    }

    // --- KONEKSI KE REPOSITORY (SINKRONISASI DATA) ---
    function loadDataFromRepository() {
        // Mengambil data dari kunci yang sama dengan repository.html
        let storedRain = localStorage.getItem('sda_rainDB');
        
        if (storedRain) {
            let rainDB = JSON.parse(storedRain);
            renderStationMarkers(rainDB);
        } else {
            console.warn("Database Repository tidak ditemukan. Sila isi data di menu Repository dulu.");
        }
    }

    function renderStationMarkers(db) {
        stationLayer.clearLayers();
        Object.keys(db).forEach(id => {
            let st = db[id];
            // Hanya gambar marker jika koordinat valid (bukan 0)
            if(st.lat !== 0 && st.lng !== 0) {
                let marker = L.circleMarker([st.lat, st.lng], { 
                    radius: 7, fillColor: "#f59e0b", color: "#ffffff", weight: 2, fillOpacity: 1 
                }).addTo(stationLayer);
                
                marker.bindTooltip(st.n, { 
                    permanent: true, direction: 'top', className: 'stasiun-label', offset: [0, -10] 
                });
                
                // Simpan ID stasiun ke dalam marker untuk referensi nanti
                marker.options.stationId = id;
            }
        });
    }

    // --- LAYER CONTROL ---
    var baseMaps = { "Peta Jalan": osm, "Satelit": satellite };
    var overlayMaps = {
        "Saluran Mikro": layerMikro,
        "Saluran PHB": layerPHB,
        "Stasiun Hujan": stationLayer,
        "Area Catchment": drawnItems
    };
    L.control.layers(baseMaps, overlayMaps, { collapsed: false, position: 'topright' }).addTo(map);

    // --- LOGIKA DRAWING & TURF ---
    function updateAnalysis() {
        if (drawnItems.getLayers().length === 0) {
            document.getElementById('area-val').innerText = "0.00";
            document.getElementById('selected-station-info').innerHTML = "Belum ada stasiun yang terdeteksi.";
            return;
        }

        let layer = drawnItems.getLayers()[0];
        let geojson = layer.toGeoJSON();
        
        // 1. Hitung Luas
        let area = turf.area(geojson) / 10000; 
        document.getElementById('area-val').innerText = area.toFixed(2);

        // 2. Cek Stasiun Terdekat (Point in Polygon)
        findStationInArea(geojson);
    }

    function findStationInArea(polygonGeoJSON) {
        let found = [];
        let rainDB = JSON.parse(localStorage.getItem('sda_rainDB')) || {};

        stationLayer.eachLayer(marker => {
            let point = turf.point([marker.getLatLng().lng, marker.getLatLng().lat]);
            if (turf.booleanPointInPolygon(point, polygonGeoJSON)) {
                let id = marker.options.stationId;
                found.push(rainDB[id].n);
            }
        });

        const infoBox = document.getElementById('selected-station-info');
        if (found.length > 0) {
            infoBox.innerHTML = `
                <div style="background:#dcfce7; color:#166534; padding:12px; border-radius:8px; font-size:13px; font-weight:700;">
                    <i data-lucide="check-circle" size="14"></i> Terdeteksi: ${found.join(", ")}
                </div>
            `;
        } else {
            infoBox.innerHTML = `<p style="color:var(--danger); font-size:12px;">Peringatan: Tidak ada stasiun hujan di dalam area catchment ini.</p>`;
        }
        lucide.createIcons();
    }

    var drawControl = new L.Control.Draw({
        draw: { 
            polygon: { shapeOptions: { color: '#2f80ed', fillOpacity: 0.3 } }, 
            polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false 
        },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.clearLayers();
        drawnItems.addLayer(e.layer);
        updateAnalysis();
    });
    map.on(L.Draw.Event.EDITED, updateAnalysis);
    map.on(L.Draw.Event.DELETED, updateAnalysis);

    // --- INISIALISASI ---
    window.onload = () => { 
        loadDataFromRepository(); 
        lucide.createIcons(); 
    };
</script>
</body>
</html>
