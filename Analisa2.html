<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA JS | Verification System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <script src="data_saluranmikro.js"></script>
    <script src="data_saluranphb.js"></script>

    <style>
        :root { --primary: #1c2b4a; --accent: #2f80ed; --bg: #f4f7fb; --white: #ffffff; --slate: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* SIDEBAR */
        #sidebar { width: 400px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #f1f5f9; }
        .sidebar-content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        #map { flex-grow: 1; position: relative; }

        /* BACK LINK */
        .back-link { display: flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        
        /* CARDS */
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .card h3 { font-size: 11px; text-transform: uppercase; color: var(--slate); margin-bottom: 12px; font-weight: 800; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        
        /* METHOD CHOICE (STACKED) */
        .method-stack { display: flex; flex-direction: column; gap: 10px; }
        .btn-choice { 
            display: flex; align-items: center; gap: 12px; background: #f8fafc; 
            border: 1px solid #e2e8f0; padding: 12px 15px; border-radius: 8px; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-choice span { font-size: 12px; font-weight: 700; color: var(--primary); }
        .btn-choice i { color: var(--accent); width: 18px; }
        .btn-choice.active { background: var(--primary); border-color: var(--primary); }
        .btn-choice.active span, .btn-choice.active i { color: white; }

        .upload-area { background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; margin-top: 15px; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* DATA TABLES */
        .data-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .data-table th { background: #f8fafc; text-align: left; padding: 10px; color: var(--slate); border: 1px solid #e2e8f0; }
        .data-table td { padding: 10px; border: 1px solid #e2e8f0; font-weight: 600; color: var(--primary); }

        /* MAP OVERLAYS */
        .area-info-box { position: absolute; bottom: 30px; left: 30px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; border: 1px solid #e2e8f0; }
        .stasiun-label { background: white !important; border: 1.5px solid #1c2b4a !important; font-weight: 800 !important; padding: 2px 8px !important; border-radius: 4px !important; font-size: 10px !important; color: #1c2b4a !important; }

        .status-msg { padding: 10px; border-radius: 6px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-top: 10px; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <a href="index.html" class="back-link"><i data-lucide="arrow-left" style="width:18px"></i> Kembali ke Menu Utama</a>
        <h1 style="font-size: 24px; font-weight: 800; color: var(--primary); line-height: 1.1;">VERIFICATION SYSTEM</h1>
        <p style="font-size: 12px; color: var(--slate); margin-top: 4px;">Suku Dinas SDA Jakarta Selatan</p>
    </div>
    
    <div class="sidebar-content">
        <div class="card">
            <h3>1. Input Area DAS (KML/Peta)</h3>
            <div class="method-stack">
                <div class="btn-choice" id="btn-upload" onclick="setMode('upload')">
                    <i data-lucide="file-up"></i>
                    <span>UPLOAD FILE KML</span>
                </div>
                <div class="btn-choice" id="btn-draw" onclick="setMode('draw')">
                    <i data-lucide="pencil-line"></i>
                    <span>DIGITASI PETA LANGSUNG</span>
                </div>
            </div>

            <div id="upload-section" style="display:none">
                <div class="upload-area" onclick="document.getElementById('fKML').click()">
                    <i data-lucide="folder-open"></i> PILIH FILE KML
                </div>
                <input type="file" id="fKML" style="display:none" accept=".kml">
            </div>
            
            <div id="draw-section" style="display:none; margin-top:15px; padding:10px; background:#f1f7ff; border-radius:6px; font-size:11px; color:var(--accent); font-weight:700;">
                <i data-lucide="info" style="width:14px; vertical-align:middle; margin-right:5px"></i> Alat digitasi aktif di kanan peta.
            </div>
        </div>

        <div id="resThiessen" class="card" style="display:none">
            <h3>2. Analisa Stasiun Terdeteksi</h3>
            <div id="status-display"></div>
            <table class="data-table">
                <thead><tr><th>Stasiun</th><th>Luas (Ha)</th><th>W</th></tr></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <div id="resYearly" class="card" style="display:none">
            <h3>3. Tren Hujan Rerata</h3>
            <canvas id="rainChart" height="240"></canvas>
        </div>
    </div>
</div>

<div id="map">
    <div class="area-info-box">
        <div style="font-size: 9px; color: var(--slate); font-weight: 800; text-transform: uppercase;">LUAS CATCHMENT</div>
        <div style="font-size: 24px; font-weight: 800; color: var(--accent);"><span id="area-val">0.00</span> Ha</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
    // --- 1. SETUP MAP & LAYERS ---
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    var map = L.map('map', { zoomControl: false, layers: [osm] }).setView([-6.2845, 106.8124], 12);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    var drawnItems = new L.FeatureGroup().addTo(map);
    var stationLayer = L.layerGroup().addTo(map);
    var layerMikro = L.layerGroup().addTo(map);
    var layerPHB = L.layerGroup().addTo(map);

    // Kontrol Layer (Kanan Atas)
    L.control.layers({ "Peta Jalan": osm, "Satelit": satellite }, { 
        "Saluran Mikro": layerMikro, "Saluran PHB": layerPHB, 
        "Stasiun Hujan": stationLayer, "Area": drawnItems 
    }, { collapsed: false, position: 'topright' }).addTo(map);

    var drawControl = new L.Control.Draw({
        draw: { polygon: { shapeOptions: { color: '#2f80ed' } }, polyline:false, circle:false, rectangle:false, marker:false, circlemarker:false }
    });

    // --- 2. DATA STASIUN LENGKAP (22 TITIK) ---
    const STATIONS_LIST = [
        {n:"KEMAYORAN", lat:-6.1556, lng:106.8400}, {n:"HALIM", lat:-6.2704, lng:106.8893},
        {n:"KLIMAT JATENG", lat:-6.5000, lng:106.7500}, {n:"KLIMAT BANTEN", lat:-6.2615, lng:106.7508},
        {n:"KATULAMPA", lat:-6.6332, lng:106.8371}, {n:"DEPOK", lat:-6.4006, lng:106.8319},
        {n:"MANGGARAI", lat:-6.2074, lng:106.8486}, {n:"KARET", lat:-6.1981, lng:106.8101},
        {n:"SETIABUDI TIMUR", lat:-6.2046, lng:106.8294}, {n:"MELATI", lat:-6.2008, lng:106.8180},
        {n:"ISTANA", lat:-6.1716, lng:106.8270}, {n:"KRUKUT HULU", lat:-6.3443, lng:106.7991},
        {n:"SUNTER HULU", lat:-6.3178, lng:106.9211}, {n:"PESANGGRAHAN", lat:-6.3971, lng:106.7718},
        {n:"ANGKE HULU", lat:-6.2183, lng:106.6945}, {n:"TANJUNGAN", lat:-6.1067, lng:106.7259},
        {n:"TOMANG BARAT", lat:-6.1671, lng:106.7800}, {n:"TELUK GONG", lat:-6.1335, lng:106.7776},
        {n:"PULO GADUNG", lat:-6.1910, lng:106.9042}, {n:"SUNTER KODAMAR", lat:-6.1551, lng:106.8869},
        {n:"RAWA BADAK", lat:-6.1211, lng:106.8967}, {n:"POMPA CIDENG", lat:-6.1736, lng:106.8063}
    ];

    function initSystem() {
        // Load Saluran Mikro & PHB
        if (typeof dataMikro !== 'undefined') {
            L.geoJSON(dataMikro, { style: { color: '#06b6d4', weight: 2.5, opacity: 0.8 } }).addTo(layerMikro);
        }
        if (typeof dataPHB !== 'undefined') {
            L.geoJSON(dataPHB, { style: { color: '#1d4ed8', weight: 4.5, opacity: 1 } }).addTo(layerPHB);
        }
        
        // Load All Stations
        STATIONS_LIST.forEach(st => {
            L.circleMarker([st.lat, st.lng], {
                radius: 7, fillColor: "#ea580c", color: "#fff", weight: 2, fillOpacity: 1
            }).addTo(stationLayer)
            .bindTooltip(st.n, { permanent: true, direction: 'top', className: 'stasiun-label', offset: [0,-10] });
        });
    }

    // --- 3. LOGIKA INTERAKSI ---
    function setMode(mode) {
        document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('draw-section').style.display = 'none';
        map.removeControl(drawControl);

        if(mode === 'upload') {
            document.getElementById('btn-upload').classList.add('active');
            document.getElementById('upload-section').style.display = 'block';
        } else {
            document.getElementById('btn-draw').classList.add('active');
            document.getElementById('draw-section').style.display = 'block';
            map.addControl(drawControl);
        }
    }

    document.getElementById('fKML').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const parser = new DOMParser();
            const kml = parser.parseFromString(ev.target.result, 'text/xml');
            const converted = toGeoJSON.kml(kml);
            drawnItems.clearLayers();
            const gLayer = L.geoJSON(converted, { style: { color: '#1c2b4a', weight: 2 } }).addTo(drawnItems);
            map.fitBounds(gLayer.getBounds());
            processHydrology(converted.features[0]);
        };
        reader.readAsText(file);
    };

    // --- 4. ANALISIS HIDROLOGI ---
    let rainChart = null;
    function processHydrology(geojson) {
    const areaHa = turf.area(geojson) / 10000;
    document.getElementById('area-val').innerText = areaHa.toFixed(2);
    
    // 1. Ambil SEMUA titik stasiun, bukan cuma yang di dalam
    const points = turf.featureCollection(STATIONS_LIST.map(st => 
        turf.point([st.lng, st.lat], { name: st.n })
    ));

    // 2. Buat Poligon Thiessen (Voronoi) berdasarkan bbox area yang digambar
    const bbox = turf.bbox(geojson);
    const options = { bbox: [bbox[0]-0.5, bbox[1]-0.5, bbox[2]+0.5, bbox[3]+0.5] };
    const voronoiPolygons = turf.voronoi(points, options);

    let found = [];
    const tBody = document.getElementById('tBody');
    tBody.innerHTML = "";

    // 3. Iris (Intersect) setiap poligon Thiessen dengan area yang digambar
    voronoiPolygons.features.forEach((voronoi, index) => {
        const intersection = turf.intersect(voronoi, geojson);
        
        if (intersection) {
            const subAreaHa = turf.area(intersection) / 10000;
            const weight = subAreaHa / areaHa; // Bobot berdasarkan luas irisan
            
            if (subAreaHa > 0.001) { // Hanya ambil yang irisannya signifikan
                const stName = points.features[index].properties.name;
                found.push({ name: stName, weight: weight });
                
                tBody.innerHTML += `
                    <tr>
                        <td>${stName}</td>
                        <td>${subAreaHa.toFixed(2)}</td>
                        <td>${weight.toFixed(4)}</td>
                    </tr>`;
            }
        }
    });

    // Update Chart dan Status
    if (found.length > 0) {
        document.getElementById('status-display').innerHTML = `<div class="status-msg status-ok"><i data-lucide="check-circle"></i> Terdeteksi ${found.length} Wilayah Pengaruh</div>`;
        document.getElementById('resThiessen').style.display = 'block';
        // Hitung data hujan rerata wilayah (Rainfall Area Average)
        // ... (lanjutkan ke renderChart)
    }
    lucide.createIcons();
}
    function renderChart(labels, data) {
        const ctx = document.getElementById('rainChart').getContext('2d');
        if (rainChart) rainChart.destroy();
        rainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Hujan (mm)', data: data, borderColor: '#2f80ed', backgroundColor: 'rgba(47,128,237,0.1)', fill: true, tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }

    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        drawnItems.addLayer(e.layer);
        processHydrology(e.layer.toGeoJSON());
    });

    window.onload = () => { initSystem(); lucide.createIcons(); };
</script>
</body>
</html>
