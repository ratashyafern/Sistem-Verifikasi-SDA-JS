<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA JS | Verification System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <script src="data_saluranmikro.js"></script>
    <script src="data_saluranphb.js"></script>

    <style>
        :root { --primary: #1c2b4a; --accent: #2f80ed; --bg: #f4f7fb; --white: #ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        #sidebar { width: 380px; background: var(--white); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 30px 25px; border-bottom: 1px solid #f1f5f9; }
        .sidebar-content { padding: 25px; flex-grow: 1; overflow-y: auto; }
        #map { flex-grow: 1; position: relative; }

        /* LABEL STASIUN PUTIH */
        .stasiun-label { 
            background: white !important; border: 1.5px solid #1c2b4a !important; 
            font-weight: 800 !important; padding: 2px 8px !important; 
            border-radius: 4px !important; font-size: 11px !important; 
            color: #1c2b4a !important; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .area-info-box { 
            position: absolute; bottom: 30px; left: 30px; 
            background: white; padding: 15px 25px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000;
        }
        .status-card { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-top: 15px; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-warn { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h1 style="font-size: 22px; font-weight: 800;">VERIFICATION SYSTEM</h1>
        <p style="font-size: 12px; opacity: 0.6;">Suku Dinas SDA Jakarta Selatan</p>
    </div>
    <div class="sidebar-content">
        <b style="font-size:16px; display:block; margin-bottom:10px;">Analisa Area</b>
        <div id="station-info-display">
            <p style="color: #94a3b8; font-size: 13px;">Gunakan alat poligon untuk memulai.</p>
        </div>
    </div>
</div>

<div id="map">
    <div class="area-info-box">
        <div style="font-size: 10px; color: #64748b; font-weight: 800;">LUAS CATCHMENT</div>
        <div style="font-size: 24px; font-weight: 800; color: var(--accent);"><span id="area-val">0.00</span> Ha</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    var map = L.map('map', { zoomControl: false, layers: [osm] }).setView([-6.2845, 106.8124], 12);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    var drawnItems = new L.FeatureGroup().addTo(map);
    var stationLayer = L.layerGroup().addTo(map);
    var layerMikro = L.layerGroup().addTo(map);
    var layerPHB = L.layerGroup().addTo(map);

    // --- RENDER SALURAN ---
    function initGeoJSON() {
        if (typeof dataMikro !== 'undefined') {
            L.geoJSON(dataMikro, { style: { color: '#06b6d4', weight: 2.5, opacity: 0.8 } }).addTo(layerMikro);
        }
        if (typeof dataPHB !== 'undefined') {
            L.geoJSON(dataPHB, { style: { color: '#1d4ed8', weight: 4.5, opacity: 1 } }).addTo(layerPHB);
        }
    }

    // --- DATA STASIUN (FULL 22) ---
    const STATIONS_LIST = [
        {n:"KEMAYORAN", lat:-6.1556, lng:106.8400}, {n:"HALIM", lat:-6.2704, lng:106.8893},
        {n:"KLIMAT JATENG", lat:-6.5000, lng:106.7500}, {n:"KLIMAT BANTEN", lat:-6.2615, lng:106.7508},
        {n:"KATULAMPA", lat:-6.6332, lng:106.8371}, {n:"DEPOK", lat:-6.4006, lng:106.8319},
        {n:"MANGGARAI", lat:-6.2074, lng:106.8486}, {n:"KARET", lat:-6.1981, lng:106.8101},
        {n:"SETIABUDI TIMUR", lat:-6.2046, lng:106.8294}, {n:"MELATI", lat:-6.2008, lng:106.8180},
        {n:"ISTANA", lat:-6.1716, lng:106.8270}, {n:"KRUKUT HULU", lat:-6.3443, lng:106.7991},
        {n:"SUNTER HULU", lat:-6.3178, lng:106.9211}, {n:"PESANGGRAHAN", lat:-6.3971, lng:106.7718},
        {n:"ANGKE HULU", lat:-6.2183, lng:106.6945}, {n:"TANJUNGAN", lat:-6.1067, lng:106.7259},
        {n:"TOMANG BARAT", lat:-6.1671, lng:106.7800}, {n:"TELUK GONG", lat:-6.1335, lng:106.7776},
        {n:"PULO GADUNG", lat:-6.1910, lng:106.9042}, {n:"SUNTER KODAMAR", lat:-6.1551, lng:106.8869},
        {n:"RAWA BADAK", lat:-6.1211, lng:106.8967}, {n:"POMPA CIDENG", lat:-6.1736, lng:106.8063}
    ];

    function loadStations() {
        let stored = localStorage.getItem('sda_rainDB');
        let rainDB = stored ? JSON.parse(stored) : {};

        // Gunakan Default jika memori kosong
        if (Object.keys(rainDB).length === 0) {
            STATIONS_LIST.forEach((st, i) => { rainDB[`st_${i}`] = { n: st.n, lat: st.lat, lng: st.lng, d: [] }; });
        }
        
        stationLayer.clearLayers();
        Object.keys(rainDB).forEach(id => {
            let s = rainDB[id];
            if (s.lat && s.lng) {
                L.circleMarker([s.lat, s.lng], {
                    radius: 7, fillColor: "#ea580c", color: "#fff", weight: 2, fillOpacity: 1
                }).addTo(stationLayer)
                .bindTooltip(s.n, { permanent: true, direction: 'top', className: 'stasiun-label', offset: [0,-10] });
            }
        });
    }

    // --- KONTROL LAYER ---
    L.control.layers({ "Peta Jalan": osm, "Satelit": satellite }, {
        "Saluran Mikro": layerMikro, "Saluran PHB": layerPHB,
        "Stasiun Hujan": stationLayer, "Area": drawnItems
    }, { collapsed: false, position: 'topright' }).addTo(map);

    // --- DRAWING LOGIC ---
    var drawControl = new L.Control.Draw({
        draw: { polygon: { shapeOptions: { color: '#2f80ed' } }, polyline: false, circle: false, marker: false, rectangle: false, circlemarker: false }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.clearLayers();
        drawnItems.addLayer(e.layer);
        
        let area = turf.area(e.layer.toGeoJSON()) / 10000;
        document.getElementById('area-val').innerText = area.toFixed(2);
        
        let found = [];
        stationLayer.eachLayer(m => {
            if (turf.booleanPointInPolygon(turf.point([m.getLatLng().lng, m.getLatLng().lat]), e.layer.toGeoJSON())) {
                found.push(m.getTooltip().getContent());
            }
        });

        document.getElementById('station-info-display').innerHTML = found.length > 0 ? 
            `<div class="status-card status-ok"><i data-lucide="check-circle"></i> Terdeteksi: ${found.join(", ")}</div>` : 
            `<div class="status-card status-warn"><i data-lucide="alert-triangle"></i> Stasiun tidak ditemukan.</div>`;
        lucide.createIcons();
    });

    window.onload = () => { initGeoJSON(); loadStations(); lucide.createIcons(); };
</script>
</body>
</html>
