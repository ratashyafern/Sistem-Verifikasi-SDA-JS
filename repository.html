<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA JS | Data Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --primary: #1e2b4a; --accent: #2f80ed; --white: #ffffff;
            --danger: #ef4444; --success: #059669; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%); 
            color: var(--primary); min-height: 100vh; display: flex; flex-direction: column; padding: 40px 5% 20px;
        }

        .back-link { 
            text-decoration: none; color: var(--accent); font-size: 14px; font-weight: 700; 
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; transition: 0.2s;
        }
        .back-link:hover { transform: translateX(-5px); color: var(--primary); }
        
        .header-title { font-size: 42px; font-weight: 800; margin-bottom: 8px; }
        .header-desc { color: #64748b; margin-bottom: 35px; }

        .tab-nav { display: flex; gap: 30px; border-bottom: 1px solid rgba(30, 43, 74, 0.1); margin-bottom: 30px; }
        .tab-item { padding-bottom: 15px; cursor: pointer; font-weight: 700; color: #94a3b8; display: flex; align-items: center; gap: 8px; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }

        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 20px 50px rgba(30, 43, 74, 0.05); display: flex; min-height: 650px; overflow: hidden; flex: 1; }

        .sidebar { width: 320px; border-right: 1px solid #eef2f6; background: #fff; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; display: flex; flex-direction: column; gap: 15px; border-bottom: 1px solid #f8fafc; }
        .sidebar-label { font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
        .btn-add { background: #f0f7ff; color: var(--accent); border: 2px dashed var(--accent); padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-add:hover { background: var(--accent); color: white; border-style: solid; }

        .st-list { overflow-y: auto; flex: 1; }
        .st-item { padding: 20px 25px; cursor: pointer; border-bottom: 1px solid #f8fafc; border-left: 4px solid transparent; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .st-item:hover { background: #f8fafc; }
        .st-item.active { background: #eff6ff; border-left-color: var(--accent); }
        .st-item h4 { font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .st-item span { font-size: 10px; color: #94a3b8; }
        
        .btn-del-st { color: #cbd5e1; padding: 5px; border-radius: 5px; transition: 0.2s; }
        .btn-del-st:hover { color: var(--danger); background: #fee2e2; }

        .editor { flex: 1; padding: 45px; display: none; }
        .editor.active { display: block; }
        .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #94a3b8; flex-direction: column; gap: 10px; }

        .editor-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 35px; }
        .coord-input-group { display: flex; gap: 15px; margin-top: 10px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #edf2f7; }
        .coord-input-group label { font-size: 11px; font-weight: 700; color: #64748b; display: flex; align-items: center; gap: 5px; }
        .small-input { border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px; font-weight: 700; width: 100px; color: var(--primary); }

        .btn-primary-action { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary-action:hover { background: #1a66d1; }
        .btn-primary-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .table-container { max-height: 400px; overflow-y: auto; border: 1px solid #f1f5f9; border-radius: 12px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: #94a3b8; text-transform: uppercase; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 10; }
        td { padding: 12px 15px; border-bottom: 1px solid #f8fafc; font-weight: 600; font-size: 14px; }

        .input-val { border: 1px solid transparent; padding: 8px; border-radius: 6px; width: 100%; font-weight: 700; transition: 0.2s; font-family: inherit; }
        .input-val:focus { outline: none; border-color: var(--accent); background: #fff; }
        .input-val.unsync { border-color: var(--warning); background: #fffbeb; }

        .badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; }
        .badge-sync { background: #dcfce7; color: var(--success); }
        .badge-unsync { background: #fef3c7; color: var(--warning); }

        .btn-sync { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-sync:hover { background: #0f172a; }
        
        .action-row { display: flex; gap: 10px; justify-content: center; }
        .btn-row-del { color: #cbd5e1; cursor: pointer; transition: 0.2s; }
        .btn-row-del:hover { color: var(--danger); transform: scale(1.2); }

        footer { margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); }
        .footer-text { font-size: 12px; color: #94a3b8; font-weight: 600; }

        /* Tambahkan ini */
        .animate-spin { 
            animation: spin 1s linear infinite; 
            display: inline-block;
        }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link"><i data-lucide="arrow-left" size="18"></i> Kembali ke Menu Utama</a>
    <h1 class="header-title">DATA REPOSITORY</h1>
    <p class="header-desc">Manajemen Database & Parameter Teknis Hidrologi Jakarta Selatan.</p>

    <div class="tab-nav">
        <div class="tab-item active" id="tabHujan" onclick="switchTab('hujan')"><i data-lucide="cloud-rain"></i> Data Hujan</div>
        <div class="tab-item" id="tabKatalog" onclick="switchTab('katalog')"><i data-lucide="box"></i> Katalog Precast</div>
        <div class="tab-item" id="tabKoefisien" onclick="switchTab('koefisien')"><i data-lucide="layers"></i> Koefisien Teknis</div>
    </div>

    <div class="glass-card">
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-label" id="sideLabel">Stasiun Hujan</span>
                <button class="btn-add" id="btnAdd" onclick="addItem()">+ TAMBAH DATA BARU</button>
            </div>
            <div class="st-list" id="itemList"></div>
        </div>

        <div id="placeholder" class="placeholder">
            <i data-lucide="database" size="40"></i>
            <p>Pilih item di sidebar untuk mengelola database.</p>
        </div>

        <div id="mainEditor" class="editor">
            <div class="editor-header">
                <div>
                    <h2 id="activeTitle" style="font-size: 28px; font-weight: 800; color: var(--primary);"></h2>
                    <div id="subtitleContainer"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary-action" style="background:var(--success)" id="btnExport" onclick="exportPDF()"><i data-lucide="download"></i> Export PDF</button>
                    <button class="btn-primary-action" id="btnTambahBaris" onclick="addNewRow()"><i data-lucide="plus"></i> Tambah Baris</button>
                </div>
            </div>

            <div class="table-container">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <button class="btn-sync" id="btnSync" onclick="syncAll()">SINKRONKAN DATA KE SISTEM <i data-lucide="save"></i></button>
        </div>
    </div>

    <footer><p class="footer-text">© 2026 Seksi Perencanaan - Sudin SDA Jakarta Selatan</p></footer>

    <script>
        // --- DATA MASTER ---
        // Data default kini dikosongkan karena sistem akan memprioritaskan 
        // tarikan data dari GitHub (hujan.json, precast.json, koefisien.json)
        const DEFAULT_RAIN = {};
        const DEFAULT_CATALOG = {};
        const DEFAULT_COEF = {};

// --- KONFIGURASI KEAMANAN (PECAH TOKEN) ---
        const P1 = "ghp_vLcAZDzdpMVH0FaYC"; 
        const P2 = "P3T2X0X7iDrOY2vULUS";

        const GH_CONFIG = {
            token: P1 + P2,
            owner: "ratashyafern",
            repo: "Sistem-Verifikasi-SDA-JS",
            branch: "main"
        };

        let rainDB = {}; 
        let catalogDB = {}; 
        let coefDB = {};

        async function loadDatabase(key, fileName) {
            const path = `data/${fileName}`;
            const url = `https://raw.githubusercontent.com/${GH_CONFIG.owner}/${GH_CONFIG.repo}/${GH_CONFIG.branch}/${path}?t=${Date.now()}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("File tidak ditemukan");
                return await response.json();
            } catch (err) {
                console.warn(`Gagal ambil ${fileName}, cek LocalStorage...`);
                const local = localStorage.getItem(key);
                return local ? JSON.parse(local) : {}; 
            }
        }

        async function initializeApp() {
            console.log("Sinkronisasi Sistem...");
            const [hujan, katalog, koef] = await Promise.all([
                loadDatabase('sda_rainDB', 'hujan.json'),
                loadDatabase('sda_catalogDB', 'precast.json'),
                loadDatabase('sda_coefDB', 'koefisien.json')
            ]);
            rainDB = hujan; catalogDB = katalog; coefDB = koef;
            renderSidebar();
        }

        window.onload = initializeApp;

        let currentMode = 'hujan';
        let currentId = null;

function saveToLocal() {
    // Simpan secara spesifik agar tidak menimpa data yang tidak sedang diedit
    if (currentMode === 'hujan') {
        localStorage.setItem('sda_rainDB', JSON.stringify(rainDB));
    } else if (currentMode === 'katalog') {
        localStorage.setItem('sda_catalogDB', JSON.stringify(catalogDB));
    } else if (currentMode === 'koefisien') {
        localStorage.setItem('sda_coefDB', JSON.stringify(coefDB));
    }
}

function switchTab(mode) {
    currentMode = mode; 
    currentId = null;
    document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
    document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('mainEditor').classList.remove('active');
    
    // Khusus untuk tab hujan, kita pastikan data sudah ter-fetch
    if (mode === 'hujan' && Object.keys(rainDB).length === 0) {
        fetchRainData();
    } else {
        renderSidebar();
    }
}

        function renderSidebar() {
            let db = currentMode === 'hujan' ? rainDB : (currentMode === 'katalog' ? catalogDB : coefDB);
            document.getElementById('sideLabel').innerText = currentMode === 'hujan' ? "Stasiun Hujan" : (currentMode === 'katalog' ? "Katalog Precast" : "Parameter Teknis");
            const list = document.getElementById('itemList');
            list.innerHTML = "";
            Object.keys(db).forEach(id => {
                const item = document.createElement('div');
                item.className = 'st-item' + (currentId === id ? ' active' : '');
                item.onclick = (e) => { if(!e.target.closest('.btn-del-st')) selectItem(id); };
                item.innerHTML = `<div><h4>${db[id].n}</h4><span>${db[id].type || 'DATABASE'}</span></div>
                                  <div class="btn-del-st" onclick="deleteItem('${id}')"><i data-lucide="trash-2" size="14"></i></div>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        function selectItem(id) {
            currentId = id;
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('mainEditor').classList.add('active');
            
            let db = currentMode === 'hujan' ? rainDB : (currentMode === 'katalog' ? catalogDB : coefDB);
            const item = db[id];
            document.getElementById('activeTitle').innerText = item.n;
            
            const subContainer = document.getElementById('subtitleContainer');
            if(currentMode === 'hujan') {
                subContainer.innerHTML = `
                    <div class="coord-input-group">
                        <label>LAT <input type="number" step="0.0001" class="small-input" value="${item.lat}" oninput="updateCoord('lat', this.value)"></label>
                        <label>LNG <input type="number" step="0.0001" class="small-input" value="${item.lng}" oninput="updateCoord('lng', this.value)"></label>
                    </div>`;
            } else {
                subContainer.innerHTML = `<p style="color: #64748b; font-size: 14px; font-weight: 600; text-transform:uppercase;">${item.type}</p>`;
            }
            renderTable();
            renderSidebar();
        }

function renderTable() {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = "";
    let hasUnsync = false;

    if (currentMode === 'hujan') {
        thead.innerHTML = `<tr><th>Urutan/Tahun</th><th>Hujan Maks (mm)</th><th>Status</th><th style="text-align:center">Aksi</th></tr>`;
        
        rainDB[currentId].d.forEach((item, idx) => {
            let year, value, status;
            if (typeof item === 'object') {
                year = item.y; value = item.v; status = item.s;
            } else {
                year = 2014 + idx; value = item; status = 'sync';
            }

            if(status === 'unsync') hasUnsync = true;
            
            tbody.innerHTML += `<tr>
                <td>
    <input 
        type="number" 
        step="any" 
        inputmode="decimal" 
        class="input-val" 
        value="${value}" 
        oninput="updateVal(${idx}, 'v', this.value)"
    >
</td>
                <td><input type="number" step="0.1" class="input-val ${status==='unsync'?'unsync':''}" value="${value}" oninput="updateVal(${idx}, 'v', this.value)"></td>
                <td><span class="badge badge-${status}">${status.toUpperCase()}ED</span></td>
                <td class="action-row"><div class="btn-row-del" onclick="deleteRow(${idx})"><i data-lucide="trash-2" size="16"></i></div></td>
            </tr>`;
        });
    } 
    // --- TAMBAHKAN/GANTI BAGIAN INI ---
    else if (currentMode === 'katalog') {
        thead.innerHTML = `<tr><th>Tipe Material</th><th>Lebar B (m)</th><th>Tinggi H (m)</th><th>Status</th><th style="text-align:center">Aksi</th></tr>`;
        
        catalogDB[currentId].data.forEach((item, idx) => {
            const status = item.s || 'sync';
            if(status === 'unsync') hasUnsync = true;

            tbody.innerHTML += `<tr>
                <td><input type="text" class="input-val" value="${item.k}" onchange="updateVal(${idx}, 'k', this.value)"></td>
                <td><input type="number" step="0.01" class="input-val" value="${item.b}" oninput="updateVal(${idx}, 'b', this.value)"></td>
                <td><input type="number" step="0.01" class="input-val" value="${item.h}" oninput="updateVal(${idx}, 'h', this.value)"></td>
                <td><span class="badge badge-${status}">${status.toUpperCase()}ED</span></td>
                <td class="action-row"><div class="btn-row-del" onclick="deleteRow(${idx})"><i data-lucide="trash-2" size="16"></i></div></td>
            </tr>`;
        });
    } else if (currentMode === 'koefisien') {
        thead.innerHTML = `<tr><th>Parameter</th><th>Nilai Koefisien</th><th>Status</th><th style="text-align:center">Aksi</th></tr>`;
        
        coefDB[currentId].data.forEach((item, idx) => {
            const status = item.s || 'sync';
            if(status === 'unsync') hasUnsync = true;

            tbody.innerHTML += `<tr>
                <td><input type="text" class="input-val" value="${item.k}" onchange="updateVal(${idx}, 'k', this.value)"></td>
                <td><input type="number" step="0.001" class="input-val" value="${item.v}" oninput="updateVal(${idx}, 'v', this.value)"></td>
                <td><span class="badge badge-${status}">${status.toUpperCase()}ED</span></td>
                <td class="action-row"><div class="btn-row-del" onclick="deleteRow(${idx})"><i data-lucide="trash-2" size="16"></i></div></td>
            </tr>`;
        });
    }

    document.getElementById('btnExport').disabled = hasUnsync;
    lucide.createIcons();
}
        function updateVal(idx, key, val) {
    let dataArr;
    if (currentMode === 'hujan') dataArr = rainDB[currentId].d;
    else if (currentMode === 'katalog') dataArr = catalogDB[currentId].data;
    else dataArr = coefDB[currentId].data;

    // Simpan nilai baru (konversi ke angka jika bukan kolom teks 'k')
    dataArr[idx][key] = (key === 'k') ? val : parseFloat(val || 0);
    
    // Beri tanda data berubah (warna kuning)
    dataArr[idx].s = 'unsync'; 
    renderTable(); 
}

        function updateCoord(key, val) {
            rainDB[currentId][key] = parseFloat(val || 0);
            rainDB[currentId].d.forEach(i => i.s = 'unsync');
            renderTable();
        }

        // PERBAIKAN: Input cerdas sesuai tab aktif
        function addItem() {
            let promptText, placeholder, typeDefault;
            
            if (currentMode === 'hujan') {
                promptText = "Masukkan Nama Stasiun Hujan:";
                placeholder = "CONTOH: STASIUN PONDOK INDAH";
                typeDefault = "DATABASE BMKG";
            } else if (currentMode === 'katalog') {
                promptText = "Masukkan Nama Material Precast:";
                placeholder = "CONTOH: U-DITCH HEAVY DUTY";
                typeDefault = "PABRIKASI";
            } else {
                promptText = "Masukkan Nama Kelompok Koefisien:";
                placeholder = "CONTOH: KOEFISIEN PENGALIRAN (C)";
                typeDefault = "SNI 2415:2016";
            }

            let n = prompt(promptText, placeholder);
            if (!n || n === placeholder) return;

            let typeDesc = prompt("Keterangan Sumber/Standar:", typeDefault);
            let id = "item_" + Date.now();

            if (currentMode === 'hujan') {
                rainDB[id] = { n: n.toUpperCase(), lat: 0, lng: 0, type: typeDesc.toUpperCase(), d: [] };
            } else if (currentMode === 'katalog') {
                catalogDB[id] = { n: n, type: typeDesc.toUpperCase(), data: [] };
            } else {
                coefDB[id] = { n: n, type: typeDesc.toUpperCase(), data: [] };
            }

            saveToLocal();
            renderSidebar();
            selectItem(id);
        }

        // PERBAIKAN: Tambah baris otomatis terisi data awal
        function addNewRow() {
            if (!currentId) return;
            let dataArr = currentMode === 'hujan' ? rainDB[currentId].d : (currentMode === 'katalog' ? catalogDB[currentId].data : coefDB[currentId].data);
            
            if (currentMode === 'hujan') {
                dataArr.push({ y: new Date().getFullYear(), v: 0, s: 'unsync' });
            } else if (currentMode === 'katalog') {
                dataArr.push({ k: "Tipe Baru", b: 0, h: 0, s: 'unsync' });
            } else {
                dataArr.push({ k: "Parameter Baru", v: 0, s: 'unsync' });
            }
            renderTable();
        }

        function deleteRow(idx) {
            let dataArr = currentMode === 'hujan' ? rainDB[currentId].d : (currentMode === 'katalog' ? catalogDB[currentId].data : coefDB[currentId].data);
            dataArr.splice(idx, 1);
            renderTable();
        }

        async function syncAll() {
            if (!currentId) return;
            let fileName = (currentMode === 'hujan') ? "hujan.json" : 
                           (currentMode === 'katalog') ? "precast.json" : "koefisien.json";
            let dataToSync = (currentMode === 'hujan') ? rainDB : 
                             (currentMode === 'katalog') ? catalogDB : coefDB;

            const path = `data/${fileName}`;
            const url = `https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${path}`;

            try {
                const btn = document.getElementById('btnSync');
                btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> MENGIRIM KE SERVER...`; btn.disabled = true;
                lucide.createIcons();

                const getFile = await fetch(url, { headers: { "Authorization": `token ${GH_CONFIG.token}` } });
                let sha = getFile.ok ? (await getFile.json()).sha : "";

                // --- BAGIAN BARU: BERSIHKAN STATUS 'UNSYNC' SEBELUM KIRIM ---
                // Agar data yang tersimpan di GitHub bersih (s:'sync')
                Object.keys(dataToSync).forEach(itemId => {
                    let arr = (currentMode === 'hujan') ? dataToSync[itemId].d : dataToSync[itemId].data;
                    if(arr) arr.forEach(row => row.s = 'sync');
                });

                const update = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_CONFIG.token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Update ${fileName} via Digital Verification`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(dataToSync, null, 2)))),
                        sha: sha
                    })
                });

                if (update.ok) {
                    alert("BERHASIL! Data tersimpan permanen di GitHub.");
                    // --- BAGIAN BARU: UPDATE TAMPILAN LOKAL ---
                    saveToLocal(); // Simpan data bersih ke LocalStorage
                    renderTable(); // Gambar ulang tabel (jadi hijau semua)
                } else {
                    const errorInfo = await update.json();
                    throw new Error(errorInfo.message);
                }
            } catch (err) { 
                alert("GAGAL SINKRONISASI: " + err.message); 
                console.error(err);
            } finally {
                const btn = document.getElementById('btnSync');
                btn.innerHTML = `SINKRONKAN DATA KE SISTEM <i data-lucide="save"></i>`;
                btn.disabled = false; lucide.createIcons();
            }
        }

        function deleteItem(id) {
            if(!confirm("Hapus data ini secara permanen dari daftar lokal?")) return;
            
            if(currentMode === 'hujan') delete rainDB[id];
            else if(currentMode === 'katalog') delete catalogDB[id];
            else delete coefDB[id];
            
            // --- BAGIAN BARU: PEMBERSIHAN LOKAL LANGSUNG ---
            saveToLocal(); // Langsung hapus dari LocalStorage browser
            
            if(currentId === id) { 
                currentId = null; 
                document.getElementById('mainEditor').classList.remove('active'); 
                document.getElementById('placeholder').style.display = 'flex'; 
            }
            renderSidebar();
            alert("Data dihapus dari memori lokal. Klik 'SINKRONKAN' untuk menghapus di server GitHub secara permanen.");
        }
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const title = document.getElementById('activeTitle').innerText;
            doc.setFontSize(18); doc.setTextColor(30, 43, 74);
            doc.text("DATA REPOSITORY - SUDIN SDA JAKSEL", 14, 20);
            doc.setFontSize(11); doc.setTextColor(100, 116, 139);
            doc.text(`Kategori: ${title}`, 14, 30);
            doc.text(`Tanggal: ${new Date().toLocaleString('id-ID')}`, 14, 37);
            const table = document.getElementById('dataTable');
            const rows = []; const headers = [];
            const headerCells = table.querySelectorAll('thead th');
            for (let i = 0; i < headerCells.length - 1; i++) headers.push(headerCells[i].innerText);
            const bodyRows = table.querySelectorAll('tbody tr');
            bodyRows.forEach(row => {
                const rowData = []; const cells = row.querySelectorAll('td');
                for (let i = 0; i < cells.length - 1; i++) {
                    const input = cells[i].querySelector('input');
                    rowData.push(input ? input.value : cells[i].innerText);
                }
                rows.push(rowData);
            });
            doc.autoTable({ head: [headers], body: rows, startY: 45, theme: 'grid', headStyles: { fillColor: [30, 43, 74] } });
            doc.save(`SDA_Data_${title.replace(/\s+/g, '_')}.pdf`);
        }

        switchTab('hujan');
    </script>
</body>
</html>
