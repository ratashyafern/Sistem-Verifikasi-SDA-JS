<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA JS | Verification System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <style>
        :root { --primary: #1c2b4a; --accent: #2f80ed; --bg: #f4f7fb; --white: #ffffff; --slate: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        
        #sidebar { width: 450px; background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #f1f5f9; background: white; }
        .sidebar-content { padding: 15px; flex-grow: 1; overflow-y: auto; }
        #map { flex-grow: 1; position: relative; }

        .back-link { display: flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        
        .card { background: #ffffff; border: 1px solid #eef2f6; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .card h3 { font-size: 11px; text-transform: uppercase; color: var(--slate); margin-bottom: 12px; font-weight: 800; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        
        .method-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn-choice { display: flex; align-items: center; gap: 12px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-choice span { font-size: 12px; font-weight: 700; color: var(--primary); }
        .btn-choice i { color: var(--accent); width: 18px; }
        .btn-choice.active { background: var(--primary); border-color: var(--primary); }
        .btn-choice.active span, .btn-choice.active i { color: white; }

        .upload-area { background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; margin-top: 15px; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .data-table th { background: #f8fafc; text-align: left; padding: 10px; color: var(--slate); border: 1px solid #e2e8f0; }
        .data-table td { padding: 10px; border: 1px solid #e2e8f0; font-weight: 600; color: var(--primary); }

        .area-info-box { position: absolute; bottom: 30px; left: 30px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; border: 1px solid #e2e8f0; }
        
        /* TOMBOL HAPUS KECIL DI POPUP */
        .btn-delete-popup {
            background: #ff4d4f; color: white; border: none; padding: 5px 10px; 
            border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 800;
            display: flex; align-items: center; gap: 4px; margin-top: 5px;
        }
        .btn-delete-popup:hover { background: #d9363e; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <a href="index.html" class="back-link"><i data-lucide="arrow-left"></i> Kembali ke Menu Utama</a>
        <h1 style="font-size: 24px; font-weight: 800; color: var(--primary); line-height: 1.1;">VERIFICATION SYSTEM</h1>
        <p style="font-size: 12px; color: var(--slate); margin-top: 4px;">Suku Dinas SDA Jakarta Selatan</p>
    </div>
    
    <div class="sidebar-content">
        <div class="card">
            <h3>1. Input Area DAS (KML/Peta)</h3>
            <div class="method-stack">
                <div class="btn-choice" id="btn-upload" onclick="setMode('upload')">
                    <i data-lucide="file-up"></i>
                    <span>UPLOAD FILE KML</span>
                </div>
                <div class="btn-choice" id="btn-draw" onclick="setMode('draw')">
                    <i data-lucide="pencil-line"></i>
                    <span>DIGITASI PETA LANGSUNG</span>
                </div>
            </div>

            <div id="upload-section" style="display:none">
                <div class="upload-area" onclick="document.getElementById('fKML').click()">
                    <i data-lucide="folder-open"></i> PILIH FILE KML
                </div>
                <input type="file" id="fKML" style="display:none" accept=".kml">
            </div>
        </div>

        <div id="resAnalysis" class="card" style="display:none">
            <h3>2. Analisa Stasiun Pengaruh</h3>
            <div style="max-height: 150px; overflow-y: auto;">
                <table class="data-table">
                    <thead><tr><th>Stasiun</th><th>Luas (Ha)</th></tr></thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="map">
    <div class="area-info-box">
        <div style="font-size: 9px; color: var(--slate); font-weight: 800; text-transform: uppercase;">LUAS CATCHMENT</div>
        <div style="font-size: 24px; font-weight: 800; color: var(--accent);"><span id="area-val">0.00</span> Ha</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
    var map = L.map('map', { zoomControl: false }).setView([-6.2845, 106.8124], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var drawnItems = new L.FeatureGroup().addTo(map);
    var thiessenLayer = L.layerGroup().addTo(map);

    var drawControl = new L.Control.Draw({
        draw: {
            polygon: { shapeOptions: { color: '#2f80ed', fillOpacity: 0.4 } },
            polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false
        }
    });

    function resetSemua() {
        drawnItems.clearLayers();
        thiessenLayer.clearLayers();
        document.getElementById('area-val').innerText = "0.00";
        document.getElementById('resAnalysis').style.display = 'none';
        map.closePopup();
    }

    // FUNGSI INI AKAN MENEMPELKAN TOMBOL HAPUS KECIL PADA SETIAP AREA
    function addDeleteAction(layer) {
        layer.on('click', function(e) {
            var container = L.DomUtil.create('div');
            var delBtn = L.DomUtil.create('button', 'btn-delete-popup', container);
            delBtn.innerHTML = '🗑️ Hapus Area';
            
            delBtn.onclick = function() {
                resetSemua();
            };

            L.popup()
                .setLatLng(e.latlng)
                .setContent(container)
                .openOn(map);
        });
    }

    function setMode(mode) {
        resetSemua();
        if(mode === 'draw') { 
            map.addControl(drawControl); 
        } else { 
            map.removeControl(drawControl); 
            document.getElementById('upload-section').style.display = 'block';
        }
    }

    map.on(L.Draw.Event.CREATED, function (e) {
        resetSemua();
        var layer = e.layer;
        drawnItems.addLayer(layer);
        
        // Pasang aksi hapus
        addDeleteAction(layer);

        var area = turf.area(layer.toGeoJSON()) / 10000;
        document.getElementById('area-val').innerText = area.toFixed(2);
        document.getElementById('resAnalysis').style.display = 'block';
    });

    lucide.createIcons();
</script>
</body>
</html>
